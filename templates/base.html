<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ChemE Roadmap{% endblock %} — Jonas Choi</title>
  <link rel="stylesheet" href="{{ static_prefix }}static/style.css">
</head>
<body>
  <header class="site">
    <div class="wrap">
      <div class="row">
        <div>
          <a class="title" href="{{ static_prefix }}index.html">ChemE Roadmap</a>
          <span class="subtitle">CC → SEAS Chemical Engineering</span>
        </div>
        <nav>
          <a href="{{ static_prefix }}index.html" {% if active_page == 'about' %}class="active"{% endif %}>About</a>
          <a href="{{ static_prefix }}dashboard.html" {% if active_page == 'dashboard' %}class="active"{% endif %}>Dashboard</a>
          <a href="{{ static_prefix }}courses.html" {% if active_page == 'courses' %}class="active"{% endif %}>Courses</a>
          <a href="{{ static_prefix }}registration.html" {% if active_page == 'registration' %}class="active"{% endif %}>Registration</a>
          <a href="{{ static_prefix }}projects.html" {% if active_page == 'projects' %}class="active"{% endif %}>Projects</a>
          <a href="{{ static_prefix }}professors.html" {% if active_page == 'professors' %}class="active"{% endif %}>Professors</a>
          <a href="{{ static_prefix }}research.html" {% if active_page == 'research' %}class="active"{% endif %}>Research</a>
          <a href="{{ static_prefix }}internships.html" {% if active_page == 'internships' %}class="active"{% endif %}>Opportunities</a>
          <a href="{{ static_prefix }}milestones.html" {% if active_page == 'milestones' %}class="active"{% endif %}>Milestones</a>
          <a href="{{ static_prefix }}advice.html" {% if active_page == 'advice' %}class="active"{% endif %}>Advice</a>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <div class="wrap">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="site">
    <div class="wrap">
      Jonas Choi &middot; Columbia University &middot; Built {{ today_str }}
    </div>
  </footer>
</body>
</html>
